  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: base_crm_api
    restart: always
    # depends_on:
    #   - db
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://base_crm:base_crm@db:3306/base_crm
    ports:
      - '3001:3000'
  
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: base_crm_web
    restart: always
    ports:
      - '3000:80'
    depends_on:
      - api

